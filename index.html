      <div class="rounded-xl border p-3" style="background:color-mix(in srgb,var(--amber-500) 10%,transparent);border-color:color-mix(in srgb,var(--amber-500) 30%,transparent)"><div class="text-[10px] uppercase" style="color:var(--muted-foreground)">Categories</div><div class="text-xl font-bold tabular-nums" style="color:var(--amber-300)">${catList.length}</div></div>
      <div class="rounded-xl border p-3" style="background:color-mix(in srgb,#3b82f6 10%,transparent);border-color:color-mix(in srgb,#3b82f6 30%,transparent)"><div class="text-[10px] uppercase" style="color:var(--muted-foreground)">Total Items Sold</div><div class="text-xl font-bold tabular-nums" style="color:#93c5fd">${catList.reduce((s,c)=>s+c.qty,0)}</div></div>
      <div class="rounded-xl border p-3" style="background:color-mix(in srgb,#10b981 10%,transparent);border-color:color-mix(in srgb,#10b981 30%,transparent)"><div class="text-[10px] uppercase" style="color:var(--muted-foreground)">Total Revenue</div><div class="text-xl font-bold tabular-nums" style="color:#6ee7b7">${fmtMoney(totalCatRevenue)}</div></div>
    </div>
    <div class="surface rounded-xl overflow-hidden">
      <div class="px-4 py-3 border-b flex items-center justify-between" style="border-color:color-mix(in srgb,var(--border) 40%,transparent)"><h3 class="text-sm font-semibold">\ud83d\udcc1 Category Breakdown</h3><button onclick="printReport('categories')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium" style="background:var(--amber-500);color:var(--amber-950)">\ud83d\udda8 Print</button></div>
      <div class="overflow-x-auto"><table class="w-full text-xs">
        <thead><tr style="background:color-mix(in srgb,var(--card) 50%,transparent)">
          <th class="text-left px-4 py-2.5 font-semibold" style="color:var(--muted-foreground)">#</th>
          <th class="text-left px-4 py-2.5 font-semibold" style="color:var(--muted-foreground)">Category</th>
          <th class="text-right px-4 py-2.5 font-semibold" style="color:var(--muted-foreground)">Items Sold</th>
          <th class="text-right px-4 py-2.5 font-semibold" style="color:var(--muted-foreground)">Products</th>
          <th class="text-right px-4 py-2.5 font-semibold" style="color:var(--muted-foreground)">Orders</th>

          <th class="text-left px-4 py-2.5 font-semibold" style="color:var(--muted-foreground)">Performance</th>

          ${catList.map((c,i)=>{const pct=totalCatRevenue?Math.round(c.revenue/totalCatRevenue*100):0;const barW=Math.max(2,pct);return `<tr style="border-top:1px solid color-mix(in srgb,var(--border) 30%,transparent)">
            <td class="px-4 py-2.5 tabular-nums" style="color:var(--muted-foreground)">${i+1}</td>
            <td class="px-4 py-2.5 font-medium">${c.name}</td>

            <td class="px-4 py-2.5 text-right tabular-nums">${c.orders.size}</td>
            <td class="px-4 py-2.5 text-right tabular-nums font-semibold" style="color:var(--amber-300)">${fmtMoney(c.revenue)}</td>
            <td class="px-4 py-2.5 text-right tabular-nums">${pct}%</td>
            <td class="px-4 py-2.5"><div class="w-full rounded-full h-2" style="background:var(--input)"><div class="h-2 rounded-full" style="width:${barW}%;background:var(--amber-500);min-width:4px"></div></div></td>

  return `<div class="h-[calc(100vh-7.5rem)] overflow-y-auto p-4 space-y-4 reports-view">

      <h2 class="text-base font-semibold">\ud83d\udcca Reports</h2>

}

// ============ SETTINGS ============
function saveInvoiceSettings() {
  const feeEl = document.getElementById("invServiceFee");
  const taxEl = document.getElementById("invTaxRate");
  if (feeEl) state.dineInServiceFee = Math.max(0, +feeEl.value || 0) / 100;
  if (taxEl) state.taxRate = Math.max(0, +taxEl.value || 0) / 100;
  saveState(); render();
  invoiceSettingsSaved = true;
  const msg = document.getElementById("invoiceSaveMsg");
  if (msg) { msg.classList.remove("hidden"); setTimeout(() => { msg.classList.add("hidden"); invoiceSettingsSaved = false; }, 2000); }
}

function addKitchenPrinter() {
  const nameInput = document.getElementById("new-kitchen-name");
  const name = nameInput ? nameInput.value.trim() : "";
  if (!name) { alert("Please enter a station name."); return; }
  const iconBtn = document.querySelector('#kitchen-icon-picker button[data-selected="1"]') || document.querySelector('#kitchen-icon-picker button');
  const colorBtn = document.querySelector('#kitchen-color-picker button[data-selected="1"]') || document.querySelector('#kitchen-color-picker button');
  const icon = iconBtn ? iconBtn.dataset.icon : "🍳";
  const color = colorBtn ? colorBtn.dataset.color : "#f59e0b";
  const id = "kit-" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/-+$/, "") + "-" + Date.now();
  if (KITCHENS.find(k => k.name.toLowerCase() === name.toLowerCase())) { alert("A kitchen station with this name already exists."); return; }
  KITCHENS.push({ id, name, icon, color });
  showAddKitchenForm = false;
  saveState(); render();
}

function removeKitchenPrinter(kitchenId) {
  const kitchen = KITCHENS.find(k => k.id === kitchenId);
  if (!kitchen) return;
  const cats = CATEGORIES.filter(c => (c.kitchenId || "main") === kitchenId);
  const fallbackId = KITCHENS.find(k => k.id !== kitchenId)?.id || "main";
  if (cats.length > 0) {
    if (!confirm(`Remove "${kitchen.name}"?\n\n${cats.length} categor${cats.length===1?'y':'ies'} assigned to this station will be moved to "${KITCHENS.find(k=>k.id===fallbackId)?.name || "Main Kitchen"}".`)) return;
    cats.forEach(c => { c.kitchenId = fallbackId; });
  } else {
    if (!confirm(`Remove "${kitchen.name}"?`)) return;
  }
  KITCHENS = KITCHENS.filter(k => k.id !== kitchenId);
  saveState(); render();
}

function addCategory() {
  const nameInput = document.getElementById("new-cat-name");
  const sortInput = document.getElementById("new-cat-sort");
  const kitchenInput = document.querySelector("input[name='new-cat-kitchen']:checked");
  const name = nameInput ? nameInput.value.trim() : "";

  const sort = sortInput ? parseInt(sortInput.value) || 0 : 0;
  const kitchenId = kitchenInput ? kitchenInput.value : "main";
  const id = "cat-" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/-+$/, "");

  showAddCategoryForm = false;
  saveState(); render();
}

function handleProductImageFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) { newProductImage = e.target.result; render(); };
  reader.readAsDataURL(file);
}

function handleProductImageDrop(event) {
  const file = event.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) { handleProductImageFile(file); }
}

function addProduct() {
  const name = (document.getElementById("new-prod-name")?.value || "").trim();
  const brand = (document.getElementById("new-prod-brand")?.value || "").trim();
  const categoryId = document.getElementById("new-prod-cat")?.value || "";
  const stock = parseInt(document.getElementById("new-prod-stock")?.value) || 100;
  const sku = (document.getElementById("new-prod-sku")?.value || "").trim();
  const desc = (document.getElementById("new-prod-desc")?.value || "").trim();

  if (!name) { alert("Please enter a product title."); return; }
  if (!categoryId) { alert("Please select a category."); return; }

  // Build variants if enabled
  let variants = undefined;
  let price = 0;
  if (newProductVariants.length > 0) {
    const valid = newProductVariants.filter(v => v.label.trim() && v.price > 0);
    if (valid.length === 0) { alert("Please add at least one size with a valid label and price."); return; }
    variants = valid.map((v, i) => ({ id: "var-" + Date.now() + "-" + i, label: v.label.trim(), price: v.price }));
    price = Math.min(...variants.map(v => v.price));
  } else {
    price = parseFloat(document.getElementById("new-prod-price")?.value) || 0;
    if (price <= 0) { alert("Please enter a valid price."); return; }
  }

  const id = "prod-" + Date.now();
  PRODUCTS.push({
    id, name, price, stock, categoryId,
    brand: brand || undefined,
    sku: sku || undefined,
    description: desc || undefined,
    imageUrl: newProductImage || undefined,
    variants: variants
  });

  showAddProductForm = false;
  newProductImage = null;
  newProductVariants = [];
  saveState(); render();
}



function toggleVariations() {
  if (newProductVariants.length > 0) {
    newProductVariants = [];
  } else {
    newProductVariants = [
      { label: "Small", price: 0 },
      { label: "Medium", price: 0 },
      { label: "Large", price: 0 }
    ];
  }
  render();
  // Re-focus: scroll dialog to bottom so user sees the new rows
  setTimeout(() => {
    const dialog = document.querySelector('.dialog-box');
    if (dialog) dialog.scrollTop = dialog.scrollHeight;
  }, 50);
}

function addVariantRow() {
  newProductVariants.push({ label: "", price: 0 });
  render();
  setTimeout(() => {
    const dialog = document.querySelector('.dialog-box');
    if (dialog) dialog.scrollTop = dialog.scrollHeight;
  }, 50);
}

function removeVariant(index) {
  if (newProductVariants.length <= 1) { alert("Product must have at least one size."); return; }
  newProductVariants.splice(index, 1);
  render();
}

function updateVariant(index, field, value) {
  if (newProductVariants[index]) {
    newProductVariants[index][field] = value;
  }
}

function updateProduct() {
  var p = PRODUCTS.find(function(x) { return x.id === editingProductId; });
  if (!p) return;
  var name = (document.getElementById("edit-prod-name") || {}).value || "";
  var catId = (document.getElementById("edit-prod-cat") || {}).value || "";
  if (!name.trim()) { alert("Product name cannot be empty."); return; }
  if (!catId) { alert("Please select a category."); return; }
  p.name = name.trim();
  p.categoryId = catId;
  if (p.variants && p.variants.length > 0) {
    for (var i = 0; i < p.variants.length; i++) {
      var lbl = (document.getElementById("edit-var-label-" + i) || {}).value || "";
      var pr = parseFloat((document.getElementById("edit-var-price-" + i) || {}).value) || 0;
      p.variants[i].label = lbl.trim();
      p.variants[i].price = pr;
    }
    p.price = Math.min.apply(null, p.variants.map(function(v) { return v.price; }));
  } else {
    p.price = parseFloat((document.getElementById("edit-prod-price") || {}).value) || p.price;
  }
  p.stock = parseInt((document.getElementById("edit-prod-stock") || {}).value) || 0;
  p.description = (document.getElementById("edit-prod-desc") || {}).value || "";
  editingProductId = null;
  saveState(); render();
}

function deleteProduct(productId) {
  if (!confirm("Are you sure you want to delete this product?")) return;
  var idx = PRODUCTS.findIndex(function(p) { return p.id === productId; });
  if (idx === -1) return;
  PRODUCTS.splice(idx, 1);
  saveState(); render();
}

function deleteCategory(categoryId) {
  var prodCount = PRODUCTS.filter(function(p) { return p.categoryId === categoryId; }).length;
  if (prodCount > 0) {
    if (!confirm("This category has " + prodCount + " product(s). Deleting it will unassign those products. Continue?")) return;
    PRODUCTS.forEach(function(p) { if (p.categoryId === categoryId) p.categoryId = ""; });
  } else {
    if (!confirm("Are you sure you want to delete this category?")) return;
  }
  var idx = CATEGORIES.findIndex(function(c) { return c.id === categoryId; });
  if (idx === -1) return;
  CATEGORIES.splice(idx, 1);
  saveState(); render();
}

function printCurrentCart() {
  if (state.cart.items.length === 0) return;
  const kitGroups = {};
  state.cart.items.forEach(i => {
    const kid = i.kitchenId || "main";
    if (!kitGroups[kid]) kitGroups[kid] = [];
    kitGroups[kid].push(i);
  });
  const totals = computeTotals();
  let html = `<html><head><title>New Order</title>
    <style>*{margin:0;padding:0;box-sizing:border-box;font-family:monospace;font-size:12px}
    body{padding:12px;max-width:300px;margin:0 auto}
    .center{text-align:center}.bold{font-weight:bold}.mt{margin-top:8px}
    .line{border-top:1px dashed #000;margin:6px 0}.item{display:flex;justify-content:space-between;padding:2px 0}
    .kit-label{font-size:10px;font-weight:bold;padding:2px 6px;margin:4px 0;display:inline-block;border:1px solid #000}
    @media print{body{margin:0;padding:8px}}
</style></head><body>
    <div class="center bold" style="font-size:16px">${state.businessName}</div>
    <div class="center" style="font-size:10px">${state.outletName}</div>
    <div class="line"></div>
    <div>Customer: ${state.cart.customerName || "Walk-in"}${state.cart.tableLabel?' · Table '+state.cart.tableLabel:''}</div>
    <div class="line"></div>`;
  Object.entries(kitGroups).forEach(([kid, items]) => {
    const k = KITCHENS.find(kk => kk.id === kid) || KITCHENS[0];
    html += `<div class="kit-label">${k.icon} ${k.name.toUpperCase()}</div>`;
    items.forEach(i => {
      html += `<div class="item"><span>×${i.qty} ${i.name}${i.variantLabel?' ['+i.variantLabel+']':''}</span><span>${fmtMoney(i.price*i.qty)}</span></div>`;
    });
    html += `<div class="line"></div>`;
  });
  html += `<div class="item"><span>Subtotal</span><span>${fmtMoney(totals.subtotal)}</span></div>`;
  if (state.cart.discount > 0) html += `<div class="item"><span>Discount${state.cart.discountType==='percent'?' ('+state.cart.discount+'%)':''}</span><span>-${fmtMoney(totals.discount)}</span></div>`;
  if (totals.serviceFee > 0) html += `<div class="item"><span>Service Fee (${Math.round(state.dineInServiceFee*100)}%)</span><span>${fmtMoney(totals.serviceFee)}</span></div>`;
  if (state.cart.fee > 0) html += `<div class="item"><span>Extra Fee</span><span>${fmtMoney(state.cart.fee)}</span></div>`;
  html += `<div class="item"><span>Tax (${Math.round(state.taxRate*100)}%)</span><span>${fmtMoney(totals.tax)}</span></div>`;
  html += `<div class="item bold" style="font-size:14px"><span>TOTAL</span><span>${fmtMoney(totals.total)}</span></div>
    <div class="line"></div>
    <div class="center" style="font-size:9px;margin-top:8px">Pre-order · ${new Date().toLocaleString()}</div>
    <script>window.onload=function(){window.print();}<\/script></body></html>`;
  const w = window.open("", "_blank", "width=350,height=600");
  w.document.write(html);
  w.document.close();
}

document.addEventListener("keydown", (e) => {

  const map = {F1:"pos",F2:"kitchen",F3:"cashier",F4:"dashboard",F5:"orders",F6:"products",F7:"categories",F8:"customers",F9:"tables",F10:"expenses",F11:"reports",F12:"settings"};

});
